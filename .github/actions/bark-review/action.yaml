name: Bark AI Code Review
description: Run bark AI code review on a pull request and post results as a comment

inputs:
  bark-version:
    description: Bark version to install. Defaults to latest.
    required: false
    default: "latest"
  provider:
    description: "LLM provider to use: gemini or openai."
    required: true
  api-key:
    description: API key for the configured provider.
    required: true
  reviewer:
    description: |
      Reviewer to use. Accepts a built-in name (e.g. linus, bob, rob, yoda),
      a path to a .md file (e.g. .bark/reviewer.md), or omit to auto-detect
      .bark/reviewer.md in the repo root.
    required: false
    default: ""
  instructions:
    description: |
      Instructions to guide the review. Accepts a built-in name (e.g. go, rust),
      a path to a .md file (e.g. .bark/review.md), raw text, or omit to
      auto-detect .bark/review.md in the repo root.
    required: false
    default: ""
  model:
    description: LLM model to use (e.g. gemini-2.5-pro, gpt-5.4-mini).
    required: true
  max-diff-lines:
    description: Maximum number of diff lines to include in the prompt (0 disables the limit).
    required: false
    default: ""
  with-description:
    description: Include the PR description in the review context.
    required: false
    default: "false"
  with-context:
    description: Include enclosing declarations (functions, structs, classes) as context for review.
    required: false
    default: "false"
  github-token:
    description: GitHub token for posting PR comments
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.26"

    - name: Install bark
      shell: bash
      run: go install github.com/ionut-t/bark/v2@${{ inputs.bark-version }}

    - name: Run bark review
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        PROVIDER=$(echo "${{ inputs.provider }}" | tr '[:upper:]' '[:lower:]')
        case "$PROVIDER" in
          "gemini")
            export GEMINI_API_KEY="${{ inputs.api-key }}"
            ;;
          "openai")
            export OPENAI_API_KEY="${{ inputs.api-key }}"
            ;;
          *)
            echo "Error: Unknown provider $PROVIDER"
            exit 1
            ;;
        esac

        ARGS=(review --pr "${{ github.event.pull_request.number }}" --provider "$PROVIDER")

        if [ -n "${{ inputs.reviewer }}" ]; then
          ARGS+=(--as "${{ inputs.reviewer }}")
        fi

        if [ -n "${{ inputs.instructions }}" ]; then
          ARGS+=(--instructions "${{ inputs.instructions }}")
        fi

        ARGS+=(--model "${{ inputs.model }}")
        [ -n "${{ inputs.max-diff-lines }}" ] && ARGS+=(--max-diff-lines "${{ inputs.max-diff-lines }}")
        [ "${{ inputs.with-context }}" = "true" ] && ARGS+=(--with-context)
        [ "${{ inputs.with-description }}" = "true" ] && ARGS+=(--with-description)

        bark "${ARGS[@]}" > /tmp/bark-review.txt 2>/tmp/bark-review-error.txt

        if [ ! -s /tmp/bark-review.txt ]; then
          echo "Review output is empty. Bark stderr:" >&2
          cat /tmp/bark-review-error.txt >&2
          exit 1
        fi

    - name: Post or update PR comment
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        MARKER="<!-- bark-review -->"
        BODY=$(printf '%s\n## Bark AI Code Review\n\n%s' "$MARKER" "$(cat /tmp/bark-review.txt)")

        COMMENT_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
          --jq '.[] | select(.body | startswith("<!-- bark-review -->")) | .id' | head -1)

        if [ -n "$COMMENT_ID" ]; then
          jq -n --arg body "$BODY" '{"body": $body}' | \
            gh api "repos/$REPO/issues/comments/$COMMENT_ID" -X PATCH --input -
        else
          jq -n --arg body "$BODY" '{"body": $body}' | \
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" -X POST --input -
        fi

    - name: Add reviewer label
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        REVIEWER="${{ inputs.reviewer }}"
        if [ -n "$REVIEWER" ] && [[ "$REVIEWER" != */* ]] && [[ "$REVIEWER" != *.md ]]; then
          NAME="${REVIEWER^}"
        else
          NAME="Bark"
        fi

        LABEL="Reviewed by $NAME"
        gh label create "$LABEL" --repo "$REPO" --color "0075ca" --force 2>/dev/null || true
        gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "$LABEL"

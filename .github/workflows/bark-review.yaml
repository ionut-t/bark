name: Bark AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  GO_VERSION: "1.26.4"

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build bark
        run: go build -o /tmp/bark .

      - name: Run bark review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BARK_MODEL: ${{ vars.BARK_MODEL }}
          BARK_REVIEWER: ${{ vars.BARK_REVIEWER }}
          BARK_MAX_DIFF_LINES: ${{ vars.BARK_MAX_DIFF_LINES }}
        run: |
          ARGS=(review --pr "${{ github.event.pull_request.number }}")
          [ -n "$BARK_REVIEWER" ] && ARGS+=(--as "$BARK_REVIEWER")
          [ -n "$BARK_MODEL" ] && ARGS+=(--model "$BARK_MODEL")
          [ -n "$BARK_MAX_DIFF_LINES" ] && ARGS+=(--max-diff-lines "$BARK_MAX_DIFF_LINES")
          /tmp/bark "${ARGS[@]}" > /tmp/bark-review.txt 2>/tmp/bark-review-error.txt

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -s /tmp/bark-review.txt ]; then
            echo "Review output is empty. Bark stderr:" >&2
            cat /tmp/bark-review-error.txt >&2
            exit 1
          fi

          MARKER="<!-- bark-review -->"
          BODY=$(printf '%s\n## Bark AI Code Review\n\n%s' "$MARKER" "$(cat /tmp/bark-review.txt)")

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("<!-- bark-review -->")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            jq -n --arg body "$BODY" '{"body": $body}' | \
              gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" -X PATCH --input -
          else
            jq -n --arg body "$BODY" '{"body": $body}' | \
              gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" -X POST --input -
          fi

      - name: Add reviewer label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BARK_REVIEWER: ${{ vars.BARK_REVIEWER }}
        run: |
          REVIEWER="${BARK_REVIEWER:-bark}"
          LABEL="Reviewed by ${REVIEWER^}"
          gh label create "$LABEL" --repo "${{ github.repository }}" --color "0075ca" --force 2>/dev/null || true
          gh pr edit "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --add-label "$LABEL"

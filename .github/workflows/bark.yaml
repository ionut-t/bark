name: Bark

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

env:
  GO_VERSION: "1.26.4"

jobs:
  pr-description:
    name: Generate PR Description
    runs-on: ubuntu-latest
    if: "github.event.action == 'opened' || (github.event.action == 'labeled' && github.event.label.name == 'bark: describe')"
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build bark
        run: go build -o /tmp/bark .

      - name: Generate PR description
        env:
          BARK_API_KEY: ${{ secrets.BARK_API_KEY }}
          BARK_PROVIDER: ${{ vars.BARK_PROVIDER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BARK_MODEL: ${{ vars.BARK_MODEL }}
          BARK_MAX_DIFF_LINES: ${{ vars.BARK_MAX_DIFF_LINES }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PROVIDER=$(echo "$BARK_PROVIDER" | tr '[:upper:]' '[:lower:]')
          case "$PROVIDER" in
            "gemini") export GEMINI_API_KEY="$BARK_API_KEY" ;;
            "openai") export OPENAI_API_KEY="$BARK_API_KEY" ;;
            "anthropic") export ANTHROPIC_API_KEY="$BARK_API_KEY" ;;
            *) echo "Error: unknown provider '$PROVIDER'" >&2; exit 1 ;;
          esac

          ARGS=(pr --pr "$PR_NUMBER" --provider "$PROVIDER")
          [ -n "$BARK_MODEL" ] && ARGS+=(--model "$BARK_MODEL")
          [ -n "$BARK_MAX_DIFF_LINES" ] && ARGS+=(--max-diff-lines "$BARK_MAX_DIFF_LINES")
          /tmp/bark "${ARGS[@]}" > /tmp/bark-pr.txt 2>/tmp/bark-pr-error.txt

          if [ ! -s /tmp/bark-pr.txt ]; then
            echo "PR description output is empty. Bark stderr:" >&2
            cat /tmp/bark-pr-error.txt >&2
            exit 1
          fi

      - name: Update PR body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          jq -n --arg body "$(cat /tmp/bark-pr.txt)" '{"body": $body}' | \
            gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" -X PATCH --input -

  review:
    name: AI Code Review
    needs: pr-description
    if: "always() && (needs.pr-description.result == 'skipped' || (needs.pr-description.result == 'success' && github.event.action == 'opened'))"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build bark
        run: go build -o /tmp/bark .

      - name: Run bark review
        env:
          BARK_API_KEY: ${{ secrets.BARK_API_KEY }}
          BARK_PROVIDER: ${{ vars.BARK_PROVIDER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BARK_MODEL: ${{ vars.BARK_MODEL }}
          BARK_REVIEWER: ${{ vars.BARK_REVIEWER }}
          BARK_MAX_DIFF_LINES: ${{ vars.BARK_MAX_DIFF_LINES }}
          BARK_WITH_CONTEXT: ${{ vars.BARK_WITH_CONTEXT }}
          WITH_DESCRIPTION: ${{ needs.pr-description.result == 'success' }}
        run: |
          PROVIDER=$(echo "$BARK_PROVIDER" | tr '[:upper:]' '[:lower:]')
          case "$PROVIDER" in
            "gemini") export GEMINI_API_KEY="$BARK_API_KEY" ;;
            "openai") export OPENAI_API_KEY="$BARK_API_KEY" ;;
            "anthropic") export ANTHROPIC_API_KEY="$BARK_API_KEY" ;;
            *) echo "Error: unknown provider '$PROVIDER'" >&2; exit 1 ;;
          esac

          ARGS=(review --pr "${{ github.event.pull_request.number }}" --provider "$PROVIDER")
          [ -n "$BARK_REVIEWER" ] && ARGS+=(--as "$BARK_REVIEWER")
          [ -n "$BARK_MODEL" ] && ARGS+=(--model "$BARK_MODEL")
          [ -n "$BARK_MAX_DIFF_LINES" ] && ARGS+=(--max-diff-lines "$BARK_MAX_DIFF_LINES")
          [ "$BARK_WITH_CONTEXT" = "true" ] && ARGS+=(--with-context)
          [ "$WITH_DESCRIPTION" = "true" ] && ARGS+=(--with-description)
          /tmp/bark "${ARGS[@]}" > /tmp/bark-review.txt 2>/tmp/bark-review-error.txt

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -s /tmp/bark-review.txt ]; then
            echo "Review output is empty. Bark stderr:" >&2
            cat /tmp/bark-review-error.txt >&2
            exit 1
          fi

          MARKER="<!-- bark-review -->"
          BODY=$(printf '%s\n## Bark AI Code Review\n\n%s' "$MARKER" "$(cat /tmp/bark-review.txt)")

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("<!-- bark-review -->")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            jq -n --arg body "$BODY" '{"body": $body}' | \
              gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" -X PATCH --input -
          else
            jq -n --arg body "$BODY" '{"body": $body}' | \
              gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" -X POST --input -
          fi

      - name: Add reviewer label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BARK_REVIEWER: ${{ vars.BARK_REVIEWER }}
        run: |
          REVIEWER="${BARK_REVIEWER:-bark}"
          LABEL="Reviewed by ${REVIEWER^}"
          gh label create "$LABEL" --repo "${{ github.repository }}" --color "0075ca" --force 2>/dev/null || true
          gh pr edit "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --add-label "$LABEL"

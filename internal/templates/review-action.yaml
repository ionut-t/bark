name: Bark AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: ionut-t/bark/.github/actions/bark-review@main
        with:
          bark-version: latest
          provider: ${{ vars.BARK_PROVIDER }}
          api-key: ${{ secrets.BARK_API_KEY }}
          model: ${{ vars.BARK_MODEL }}
          reviewer: ${{ vars.BARK_REVIEWER }}
          max-diff-lines: ${{ vars.BARK_MAX_DIFF_LINES }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
